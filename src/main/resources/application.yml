server:
  port: ${SERVER_PORT:8080}
  shutdown: graceful

spring:
  application:
    name: msgbridge
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:h2:file:./data/msgbridge;MODE=MySQL;DATABASE_TO_LOWER=TRUE;CASE_INSENSITIVE_IDENTIFIERS=TRUE}
    username: ${SPRING_DATASOURCE_USERNAME:sa}
    password: ${SPRING_DATASOURCE_PASSWORD:}
    driver-class-name: ${SPRING_DATASOURCE_DRIVER:org.h2.Driver}
  flyway:
    enabled: true
  jpa:
    hibernate:
      ddl-auto: none
    open-in-view: false
    properties:
      hibernate:
        jdbc:
          time_zone: UTC
  jackson:
    default-property-inclusion: non_null

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus
  endpoint:
    health:
      probes:
        enabled: true

logging:
  level:
    root: INFO
    com.msgbridge: INFO

msgbridge:
  security:
    master-key: ${MSGBRIDGE_MASTER_KEY:change-me-dev-master-key}
    admin-key: ${MSGBRIDGE_ADMIN_KEY:dev-admin-key}
    timestamp-skew-seconds: ${MSGBRIDGE_TIMESTAMP_SKEW_SECONDS:300}
    default-admin-username: ${MSGBRIDGE_DEFAULT_ADMIN_USERNAME:admin}
    default-admin-password: ${MSGBRIDGE_DEFAULT_ADMIN_PASSWORD:admin123}
    admin-token-ttl-seconds: ${MSGBRIDGE_ADMIN_TOKEN_TTL_SECONDS:28800}
  worker:
    enabled: ${MSGBRIDGE_WORKER_ENABLED:true}
    batch-size: ${MSGBRIDGE_WORKER_BATCH_SIZE:20}
    fixed-delay-ms: ${MSGBRIDGE_WORKER_FIXED_DELAY_MS:1000}
  seed:
    demo-enabled: ${MSGBRIDGE_SEED_DEMO:true}

---
spring:
  config:
    activate:
      on-profile: mysql
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/msgbridge?useUnicode=true&characterEncoding=utf8&useSSL=false&allowPublicKeyRetrieval=true&serverTimezone=UTC}
    username: ${SPRING_DATASOURCE_USERNAME:msgbridge}
    password: ${SPRING_DATASOURCE_PASSWORD:msgbridge}
    driver-class-name: com.mysql.cj.jdbc.Driver
